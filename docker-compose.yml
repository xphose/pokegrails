services:
  app:
    build: .
    container_name: pokegrails
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: pokegrails-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    networks:
      - web

  backup:
    image: alpine:3.19
    container_name: pokegrails-backup
    restart: unless-stopped
    volumes:
      - app-data:/data:ro
      - backup-data:/backups
    entrypoint: /bin/sh
    command: >
      -c 'apk add --no-cache sqlite && while true; do
        STAMP=$$(date +%Y%m%d-%H%M%S);
        sqlite3 /data/pokegrails.sqlite ".backup /backups/pokegrails-$$STAMP.sqlite";
        find /backups -name "*.sqlite" -mtime +30 -delete;
        echo "[backup] $$STAMP done";
        sleep 86400;
      done'
    networks:
      - web

volumes:
  app-data:
  app-logs:
  caddy-data:
  caddy-config:
  backup-data:

networks:
  web:
    driver: bridge
